services:
  db:
    image: postgres:16
    container_name: factoratlas-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: factoratlas
    ports:
      - "5432:5432"
    volumes:
      - factoratlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factoratlas"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./backend
    container_name: factoratlas-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/factoratlas
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
    command: ["sh", "/app/docker-entrypoint.sh"]

volumes:
  factoratlas_postgres_data:
